# **Final Presentation – Cannito Bakery**
### *Martina Calia – 58809A*  
### University of Milan – Web Communication (2025/2026)

---

# **1. The Idea**

I decided to design a webpage for **Cannito Bakery**, an artisanal, family-owned bakery located in Altamura and already active on Instagram.

The goal was to create a **custom showcase website** that reflects the brand’s warm identity, highlights its products, and supports a more structured and professional digital presence.

The website focuses on **simplicity, warmth, and usability**, offering an aesthetic aligned with the bakery’s values.

---

# **2. Background & Project Objectives**

Cannito Bakery already has a strong Instagram presence built on warm tones and friendly atmosphere.

**Main objectives:**
- Transfer this identity into a coherent website.
- Build a strong, consistent brand identity.  
- Improve product presentation.  
- Create intuitive navigation.  
- Communicate craftsmanship and warmth visually.  
- Provide clear contact information + Google Maps redirect.

---

# **3. Target Audience**

- Local residents and families looking for authentic bakery products  
- Tourists visiting Altamura  
- Young adults (18–35) who appreciate artisanal, high-quality goods  
- Consumers valuing tradition and transparency  
- Food enthusiasts searching online for trusted bakeries  

---

# **4. Site Structure**

The website includes:

- **Home**  
  Logo, hero visuals, introduction  
- **Our Products**  
  Clickable categories with related photos  
- **Our Story**  
  Values, tradition, family heritage  
- **Blog**  
  Newspaper articles + TV programme participation  
- **Services**  
  Distribution + catering for events  
- **Contacts & Social Feed**  
  Google Maps redirect + Instagram feed  

The structure is intentionally simple and visually focused.

---

# **5. Design Approach**

I remained aligned with Cannito Bakery’s existing Instagram aesthetic.

Key choices:
- Warm palette: **beige, cream, dark green, gold highlights**  
- Soft, welcoming typography  
- Rich but organized compositions  
- Subtle shadows + rounded borders  
- Balance of traditional atmosphere and modern usability  

---

# **6. Technical Choices**

- **HTML5** – semantic structure  
- **CSS3** – colors, layout, animations, responsiveness  
- **JavaScript** – interactive filtering + click functions  

---

# **7. Long-Term Expansion Plans**

- Online ordering system  
- Newsletter / customer updates  
- Seasonal promotions  
- Multi-language support (IT/EN)  

---

# **8. Conclusions**

The final website:  
- Faithfully represents **Cannito Bakery**  
- Highlights products with a warm artisanal aesthetic  
- Maintains consistency with the Instagram brand identity  
- Strengthens the bakery’s overall digital presence
